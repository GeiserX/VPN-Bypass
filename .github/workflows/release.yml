name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.0)'
        required: true
        type: string

# A tag push and a manual/auto-tag dispatch can both target the same version. Serialize
# per ref so two runs never build+publish the same release or race on the Homebrew cask
# push. cancel-in-progress: false — never abort an in-flight release mid-publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: macos-latest  # free + unlimited on public repos; ships full Xcode for the universal build

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: latest-stable

      - name: Determine version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Building version: $VERSION"

      - name: Update Info.plist version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" Info.plist

      - name: Build release
        run: make release

      - name: Calculate SHA256
        id: sha
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          SHA256=$(shasum -a 256 "dist/VPN-Bypass-$VERSION.dmg" | awk '{print $1}')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "📝 SHA256: $SHA256"

      - name: Generate changelog
        id: changelog
        env:
          VERSION_NUMBER: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          VERSION="v$VERSION_NUMBER"
          PREV_TAG=$(git tag -l "v*" --sort=-version:refname | sed -n '2p')
          
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          
          echo "📝 Generating changelog from $PREV_TAG to $VERSION"
          
          {
            echo "## What's Changed"
            echo ""
            
            # Features
            FEATURES=$(git log $PREV_TAG..HEAD --pretty=format:"- %s" --grep="^feat" 2>/dev/null || true)
            if [ -n "$FEATURES" ]; then
              echo "### ✨ Features"
              echo "$FEATURES" | head -20
              echo ""
            fi
            
            # Fixes
            FIXES=$(git log $PREV_TAG..HEAD --pretty=format:"- %s" --grep="^fix" 2>/dev/null || true)
            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bug Fixes"
              echo "$FIXES" | head -20
              echo ""
            fi
            
            # Other changes
            OTHERS=$(git log $PREV_TAG..HEAD --pretty=format:"- %s" --invert-grep --grep="^feat" --invert-grep --grep="^fix" 2>/dev/null | head -10 || true)
            if [ -n "$OTHERS" ]; then
              echo "### 🔧 Other Changes"
              echo "$OTHERS"
              echo ""
            fi
            
            echo "---"
            echo ""
            echo "## Installation"
            echo ""
            echo "### Homebrew (recommended)"
            echo '```bash'
            echo "brew tap GeiserX/vpn-bypass"
            echo "brew install --cask vpn-bypass"
            echo '```'
            echo ""
            echo "### Manual Download"
            echo "Download \`VPN-Bypass-$VERSION_NUMBER.dmg\` from the assets below."
            echo ""
            echo "---"
            echo ""
            echo "**SHA256:** \`$SHA256\`"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREV_TAG...$VERSION"
          } > changelog.md
          
          cat changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "VPN Bypass v${{ steps.version.outputs.version }}"
          body_path: changelog.md
          draft: false
          prerelease: false
          files: |
            dist/VPN-Bypass-${{ steps.version.outputs.version }}.dmg

      - name: Update Homebrew Cask
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          # Clone homebrew tap
          git clone "https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/GeiserX/homebrew-vpn-bypass.git" homebrew-tap
          cd homebrew-tap
          
          # Update cask file
          sed -i '' "s/version \".*\"/version \"$VERSION\"/" Casks/vpn-bypass.rb 2>/dev/null || \
          sed -i "s/version \".*\"/version \"$VERSION\"/" Casks/vpn-bypass.rb
          
          sed -i '' "s/sha256 \".*\"/sha256 \"$SHA256\"/" Casks/vpn-bypass.rb 2>/dev/null || \
          sed -i "s/sha256 \".*\"/sha256 \"$SHA256\"/" Casks/vpn-bypass.rb

          # Ensure the `binary` stanza is present so `vpnb` is symlinked onto PATH by
          # `brew install --cask`. It MUST be rooted at #{appdir}: Homebrew moves the
          # .app to /Applications BEFORE linking, so a relative source would resolve to
          # the emptied staging dir and abort the whole install (CaskError: source not
          # there). The seds above only rewrite version/sha256, so a tap cask predating
          # this change never otherwise gains the stanza. grep-guard = idempotent; #{...}
          # is literal in a Perl replacement (only $ and @ interpolate), so it reaches the
          # cask verbatim for Ruby to interpolate at install time.
          grep -q 'Contents/MacOS/vpnb' Casks/vpn-bypass.rb || \
            perl -0777pi -e 's{(app "VPN Bypass\.app"\n)}{$1  binary "#{appdir}/VPN Bypass.app/Contents/MacOS/vpnb"\n}' Casks/vpn-bypass.rb
          # Fail the release loudly if the app anchor moved and the insert silently no-op'd
          # (otherwise vpnb would just never appear on PATH, with no error).
          grep -q 'Contents/MacOS/vpnb' Casks/vpn-bypass.rb || { echo "::error::vpnb binary stanza not inserted into the tap cask (app anchor not found)"; exit 1; }

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/vpn-bypass.rb
          git diff --staged --quiet || git commit -m "Update vpn-bypass to v$VERSION"
          git push
          
          echo "✅ Homebrew cask updated to v$VERSION"
          
          echo "## 🍺 Homebrew Cask Updated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "**SHA256:** $SHA256" >> $GITHUB_STEP_SUMMARY
