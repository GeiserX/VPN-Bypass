name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '**/*.swift'
      - 'Package.swift'
      - 'Package.resolved'
      - '.github/workflows/ci.yml'
  # No paths filter on PRs: `test` is a required status check in the "Protect
  # main" ruleset, so it MUST report on every PR — a path-filtered run that is
  # skipped never reports and blocks the PR forever. Push to main stays
  # path-filtered (above) to avoid redundant post-merge runs.
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    # GitHub-hosted macOS runners are free + unlimited on public repos, and being
    # throwaway VMs they remove the self-hosted fork-PR attack surface entirely
    # (so no fork guard is needed). They ship full Xcode, so XCTest is available.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Select Xcode toolchain
        # `swift test` needs XCTest (full Xcode, not the Command Line Tools) and a
        # Swift 6 compiler (the code uses `sending`). Point at the newest Xcode on
        # the image, failing fast with a clear message if somehow none is present.
        run: |
          XCODE_APP=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1 || true)
          if [ -z "$XCODE_APP" ]; then
            echo "::error::No Xcode found in /Applications; full Xcode (not just Command Line Tools) is required for 'swift test' (XCTest) and a Swift 6 compiler."
            exit 1
          fi
          DEV_DIR="$XCODE_APP/Contents/Developer"
          echo "Using Xcode at $XCODE_APP"
          sudo xcode-select -s "$DEV_DIR"
          echo "DEVELOPER_DIR=$DEV_DIR" >> "$GITHUB_ENV"
      - name: Verify XCTest is available
        run: xcrun --find xctest
      - name: Cache SPM
        uses: actions/cache@v6
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-
      - run: swift test --enable-code-coverage
      - name: Convert coverage
        run: |
          BIN=$(find .build -path '*.xctest/Contents/MacOS/*' -type f ! -path '*.dSYM*' | head -1)
          xcrun llvm-cov export "$BIN" -instr-profile .build/debug/codecov/default.profdata -format lcov > coverage.lcov
      - uses: codecov/codecov-action@v7
        if: github.event_name == 'push'
        with:
          files: coverage.lcov
          fail_ci_if_error: false
