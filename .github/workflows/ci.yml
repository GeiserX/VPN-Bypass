name: CI
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: swift test --enable-code-coverage
      - name: Convert coverage
        run: |
          BIN=$(find .build/debug -name '*.xctest' -type d | head -1)/Contents/MacOS/$(find .build/debug -name '*.xctest' -type d | head -1 | xargs basename | sed 's/.xctest//')
          xcrun llvm-cov export "$BIN" -instr-profile .build/debug/codecov/default.profdata -format lcov > coverage.lcov
      - uses: codecov/codecov-action@v5
        if: github.event_name == 'push'
        with:
          files: coverage.lcov
          fail_ci_if_error: false
