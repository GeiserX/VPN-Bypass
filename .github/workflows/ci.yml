name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: swift test --enable-code-coverage
      - name: Convert coverage
        run: |
          xcrun llvm-cov export .build/debug/*Tests -instr-profile .build/debug/codecov/default.profdata -format lcov > coverage.lcov
        continue-on-error: true
      - uses: codecov/codecov-action@v5
        if: github.event_name == 'push'
        with:
          files: coverage.lcov
          fail_ci_if_error: false
