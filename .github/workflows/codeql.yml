name: CodeQL

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  security-events: write
  contents: read

jobs:
  analyze:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: swift
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
