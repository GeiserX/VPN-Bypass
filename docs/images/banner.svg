<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="50" x2="900" y2="50"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Shield with bypass arrow -->
  <g transform="translate(100, 100)">
    <!-- Shield shape -->
    <path d="M0,-50 L42,-34 L42,10 C42,40 22,56 0,64 C-22,56 -42,40 -42,10 L-42,-34 Z"
          fill="url(#glow)" stroke="#ffffff" stroke-width="2.5" opacity="0.9"/>
    <!-- Bypass arrow curving around shield -->
    <path d="M-55,-10 C-55,-40 -20,-55 10,-55" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <polygon points="10,-62 22,-55 10,-48" fill="#ffffff" opacity="0.6"/>
    <path d="M55,10 C55,40 20,55 -10,55" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <polygon points="-10,48 -22,55 -10,62" fill="#ffffff" opacity="0.6"/>
    <!-- Split line through shield -->
    <line x1="-20" y1="-20" x2="20" y2="20" stroke="#ffffff" stroke-width="2" stroke-dasharray="4,3" opacity="0.5"/>
  </g>

  <!-- Title -->
  <text x="200" y="95" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" fill="#ffffff" letter-spacing="-1">
    VPN Bypass
  </text>

  <!-- Subtitle -->
  <text x="202" y="130" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#ffffff" opacity="0.65" letter-spacing="0.3">
    macOS menu bar app to route traffic around your VPN
  </text>

  <!-- Decorative: network nodes on right -->
  <g transform="translate(760, 50)" opacity="0.15">
    <circle cx="20" cy="10" r="10" fill="#ffffff"/>
    <circle cx="60" cy="50" r="10" fill="#ffffff"/>
    <circle cx="15" cy="90" r="10" fill="#ffffff"/>
    <circle cx="75" cy="100" r="8" fill="#ffffff"/>
    <line x1="20" y1="20" x2="60" y2="40" stroke="#ffffff" stroke-width="2"/>
    <line x1="60" y1="60" x2="15" y2="80" stroke="#ffffff" stroke-width="2"/>
    <line x1="60" y1="60" x2="75" y2="92" stroke="#ffffff" stroke-width="2"/>
  </g>
</svg>
