<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="bypassGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4CAF50" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#4CAF50" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4CAF50" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="50" x2="900" y2="50"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Route-split diagram — bigger, more refined -->
  <g transform="translate(38, 100)">

    <!-- Laptop — clean, proportional -->
    <g opacity="0.85">
      <!-- Screen -->
      <rect x="0" y="-30" width="40" height="28" rx="3" fill="url(#glow)" stroke="#ffffff" stroke-width="1.8"/>
      <!-- Screen content hint (two lines) -->
      <rect x="7" y="-23" width="18" height="2.5" rx="1" fill="#ffffff" opacity="0.25"/>
      <rect x="7" y="-17" width="12" height="2.5" rx="1" fill="#ffffff" opacity="0.15"/>
      <!-- Base -->
      <path d="M-4,0 L44,0 L40,5 L0,5 Z" fill="url(#glow)" stroke="#ffffff" stroke-width="1.2" opacity="0.7"/>
    </g>

    <!-- VPN tunnel path (dimmed, dashed — the "blocked" route) -->
    <g opacity="0.2">
      <!-- Tunnel pipe outline -->
      <path d="M48,-16 L180,-16" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.15"/>
      <!-- Dashed center line -->
      <line x1="48" y1="-16" x2="180" y2="-16" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="8,5"/>
      <!-- Lock icon on tunnel -->
      <rect x="104" y="-24" width="12" height="10" rx="2" fill="#ffffff" opacity="0.6"/>
      <path d="M107,-24 L107,-28 A3,3 0 0,1 113,-28 L113,-24" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
    </g>
    <text x="114" y="-30" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff" opacity="0.18" letter-spacing="2">VPN</text>

    <!-- Bypass route — the hero path, smooth green arc -->
    <!-- Glow underneath -->
    <path d="M48,-10 C75,50 155,50 182,-10" fill="none" stroke="#4CAF50" stroke-width="12" stroke-linecap="round" opacity="0.06"/>
    <!-- Main bypass curve -->
    <path d="M48,-10 C75,50 155,50 182,-10" fill="none" stroke="#4CAF50" stroke-width="2.8" stroke-linecap="round" opacity="0.75"/>
    <!-- Traffic flow dots along the curve -->
    <circle cx="68" cy="12" r="2.5" fill="#4CAF50" opacity="0.9"/>
    <circle cx="92" cy="28" r="2" fill="#4CAF50" opacity="0.7"/>
    <circle cx="114" cy="32" r="2.5" fill="#4CAF50" opacity="0.55"/>
    <circle cx="138" cy="28" r="2" fill="#4CAF50" opacity="0.4"/>
    <circle cx="162" cy="12" r="2.5" fill="#4CAF50" opacity="0.3"/>
    <!-- Arrow tip at destination -->
    <polygon points="178,-14 188,-10 178,-6" fill="#4CAF50" opacity="0.75"/>

    <!-- Globe destination — refined -->
    <g transform="translate(202, -16)" opacity="0.8">
      <circle cx="0" cy="0" r="20" fill="url(#glow)" stroke="#ffffff" stroke-width="1.8"/>
      <!-- Meridians -->
      <ellipse cx="0" cy="0" rx="20" ry="10" fill="none" stroke="#ffffff" stroke-width="0.7" opacity="0.35"/>
      <ellipse cx="0" cy="0" rx="10" ry="20" fill="none" stroke="#ffffff" stroke-width="0.7" opacity="0.25"/>
      <!-- Equator + prime meridian -->
      <line x1="-20" y1="0" x2="20" y2="0" stroke="#ffffff" stroke-width="0.7" opacity="0.3"/>
      <line x1="0" y1="-20" x2="0" y2="20" stroke="#ffffff" stroke-width="0.7" opacity="0.3"/>
    </g>
  </g>

  <!-- Title -->
  <text x="290" y="90" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" fill="#ffffff" letter-spacing="-1">
    VPN Bypass
  </text>

  <!-- Subtitle -->
  <text x="292" y="126" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#ffffff" opacity="0.65" letter-spacing="0.3">
    macOS menu bar app to route traffic around your VPN
  </text>

  <!-- Decorative: macOS menu bar hint on right -->
  <g transform="translate(745, 65)" opacity="0.15">
    <rect x="0" y="0" width="115" height="20" rx="5" fill="#ffffff"/>
    <path d="M16,4 L26,2 L26,11 C26,16 22,18 21,19 C20,18 16,16 16,11 Z" fill="#1565C0" opacity="0.8"/>
    <circle cx="38" cy="10" r="3" fill="#4CAF50"/>
    <rect x="48" y="7" width="22" height="6" rx="3" fill="#1565C0" opacity="0.5"/>
    <rect x="76" y="7" width="16" height="6" rx="3" fill="#1565C0" opacity="0.3"/>
    <rect x="0" y="26" width="115" height="55" rx="5" fill="#ffffff" opacity="0.6"/>
    <circle cx="14" cy="40" r="3" fill="#4CAF50" opacity="0.8"/>
    <rect x="24" y="37" width="46" height="6" rx="2" fill="#1565C0" opacity="0.4"/>
    <circle cx="14" cy="54" r="3" fill="#4CAF50" opacity="0.6"/>
    <rect x="24" y="51" width="36" height="6" rx="2" fill="#1565C0" opacity="0.3"/>
    <circle cx="14" cy="68" r="3" fill="#4CAF50" opacity="0.4"/>
    <rect x="24" y="65" width="54" height="6" rx="2" fill="#1565C0" opacity="0.2"/>
  </g>
</svg>
