<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="50" x2="900" y2="50"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Route split: traffic from device splits into VPN tunnel and bypass route -->
  <g transform="translate(55, 100)">
    <!-- Source: laptop silhouette -->
    <rect x="0" y="-18" width="28" height="18" rx="3" fill="url(#glow)" stroke="#ffffff" stroke-width="1.8" opacity="0.8"/>
    <rect x="-3" y="2" width="34" height="4" rx="2" fill="url(#glow)" stroke="#ffffff" stroke-width="1.2" opacity="0.6"/>

    <!-- VPN tunnel (dashed line, straight through) -->
    <line x1="36" y1="-9" x2="148" y2="-9" stroke="#ffffff" stroke-width="2" stroke-dasharray="6,4" opacity="0.25"/>
    <text x="92" y="-16" text-anchor="middle" font-family="monospace" font-size="8" fill="#ffffff" opacity="0.25">VPN</text>

    <!-- Bypass route (solid green curve going below) -->
    <path d="M36,-5 C60,35 128,35 148,-5" fill="none" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <!-- Arrow at end of bypass -->
    <polygon points="144,-9 152,-5 144,-1" fill="#4CAF50" opacity="0.7"/>

    <!-- Destination: globe -->
    <circle cx="166" cy="-9" r="16" fill="url(#glow)" stroke="#ffffff" stroke-width="1.8" opacity="0.7"/>
    <ellipse cx="166" cy="-9" rx="16" ry="8" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.3"/>
    <line x1="166" y1="-25" x2="166" y2="7" stroke="#ffffff" stroke-width="0.8" opacity="0.3"/>
    <line x1="150" y1="-9" x2="182" y2="-9" stroke="#ffffff" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Title -->
  <text x="260" y="90" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" fill="#ffffff" letter-spacing="-1">
    VPN Bypass
  </text>

  <!-- Subtitle -->
  <text x="262" y="126" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#ffffff" opacity="0.65" letter-spacing="0.3">
    macOS menu bar app to route traffic around your VPN
  </text>

  <!-- Decorative: macOS menu bar hint on right -->
  <g transform="translate(745, 65)" opacity="0.15">
    <!-- Menu bar -->
    <rect x="0" y="0" width="115" height="20" rx="5" fill="#ffffff"/>
    <!-- Shield in menu bar -->
    <path d="M16,4 L26,2 L26,11 C26,16 22,18 21,19 C20,18 16,16 16,11 Z" fill="#1565C0" opacity="0.8"/>
    <!-- Status dot -->
    <circle cx="38" cy="10" r="3" fill="#4CAF50"/>
    <rect x="48" y="7" width="22" height="6" rx="3" fill="#1565C0" opacity="0.5"/>
    <rect x="76" y="7" width="16" height="6" rx="3" fill="#1565C0" opacity="0.3"/>

    <!-- Dropdown -->
    <rect x="0" y="26" width="115" height="55" rx="5" fill="#ffffff" opacity="0.6"/>
    <circle cx="14" cy="40" r="3" fill="#4CAF50" opacity="0.8"/>
    <rect x="24" y="37" width="46" height="6" rx="2" fill="#1565C0" opacity="0.4"/>
    <circle cx="14" cy="54" r="3" fill="#4CAF50" opacity="0.6"/>
    <rect x="24" y="51" width="36" height="6" rx="2" fill="#1565C0" opacity="0.3"/>
    <circle cx="14" cy="68" r="3" fill="#4CAF50" opacity="0.4"/>
    <rect x="24" y="65" width="54" height="6" rx="2" fill="#1565C0" opacity="0.2"/>
  </g>
</svg>
