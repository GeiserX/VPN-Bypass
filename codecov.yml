codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: 70%
        threshold: 5%
    patch:
      default:
        target: 80%
        threshold: 10%

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true
  require_base: false
  require_head: true

ignore:
  - ".build/**"
  - "Tests/**"
  - "**/XCTest*"
  - "Package.swift"
  - "Helper/**"
  - "Sources/VPNBypass/**"
  - "Sources/VPNBypassCore/SettingsView.swift"
  - "Sources/VPNBypassCore/MenuBarViews.swift"
  - "Sources/VPNBypassCore/VPNBypassApp.swift"
